<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B27"/>
    </linearGradient>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#7C3AED"/>
      <stop offset="55%"  style="stop-color:#4F8EF7"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   style="stop-color:#1a0e3a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0"/>
    </radialGradient>
    <filter id="lineGlow" filterUnits="userSpaceOnUse" x="0" y="0" width="1024" height="1024">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" filterUnits="userSpaceOnUse" x="0" y="0" width="1024" height="1024">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#bgGlow)"/>
  <g filter="url(#lineGlow)" opacity="0.55">
    <line x1="220" y1="754" x2="220" y2="270" stroke="#7C3AED" stroke-width="90" stroke-linecap="round"/>
    <line x1="220" y1="270" x2="512" y2="520" stroke="#4F8EF7" stroke-width="90" stroke-linecap="round"/>
    <line x1="512" y1="520" x2="804" y2="270" stroke="#4F8EF7" stroke-width="90" stroke-linecap="round"/>
    <line x1="804" y1="270" x2="804" y2="754" stroke="#06B6D4" stroke-width="90" stroke-linecap="round"/>
  </g>
  <line x1="220" y1="754" x2="220" y2="270" stroke="url(#mg)" stroke-width="58" stroke-linecap="round"/>
  <line x1="220" y1="270" x2="512" y2="520" stroke="url(#mg)" stroke-width="58" stroke-linecap="round"/>
  <line x1="512" y1="520" x2="804" y2="270" stroke="url(#mg)" stroke-width="58" stroke-linecap="round"/>
  <line x1="804" y1="270" x2="804" y2="754" stroke="url(#mg)" stroke-width="58" stroke-linecap="round"/>
  <g filter="url(#dotGlow)">
    <circle cx="220" cy="270" r="44" fill="url(#mg)"/>
    <circle cx="220" cy="270" r="20" fill="#E8DAFF" opacity="0.92"/>
    <circle cx="220" cy="754" r="38" fill="url(#mg)"/>
    <circle cx="220" cy="754" r="16" fill="#C7EEFF" opacity="0.88"/>
    <circle cx="512" cy="520" r="48" fill="url(#mg)"/>
    <circle cx="512" cy="520" r="22" fill="#fff" opacity="0.95"/>
    <circle cx="804" cy="270" r="44" fill="url(#mg)"/>
    <circle cx="804" cy="270" r="20" fill="#E8DAFF" opacity="0.92"/>
    <circle cx="804" cy="754" r="38" fill="url(#mg)"/>
    <circle cx="804" cy="754" r="16" fill="#C7EEFF" opacity="0.88"/>
  </g>
  <rect width="1024" height="1024" rx="224" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
</svg>
