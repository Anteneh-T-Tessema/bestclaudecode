name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest ruff
      - run: ruff check src
      - run: pytest src/tests/ -q

  build-log-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-servers/build-log-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test

  desktop-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Install Electron's Linux runtime libraries + a virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xauth libasound2t64 libgbm1
      - name: Run e2e suite against a real Electron + CDP session
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" npm run test:e2e
        env:
          # CI containers commonly lack the unprivileged user namespace /
          # setuid sandbox helper permissions Electron's sandbox needs —
          # Electron honors this env var natively, so the app itself never
          # needs a --no-sandbox code change that would also weaken it for
          # every real user on every platform.
          ELECTRON_DISABLE_SANDBOX: "1"
