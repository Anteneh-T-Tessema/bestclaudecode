name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest ruff
      - run: ruff check src
      - run: pytest src/tests/ -q

  build-log-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-servers/build-log-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test
